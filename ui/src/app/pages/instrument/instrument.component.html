@let uid = ticker() | uidByTicker | async;

@if (uid) {
  <instrument-complex-info
    [instrumentUid]="uid"
    [accountId]="accountId()"
  ></instrument-complex-info>

  <br>
  <br>
  <br>

  <h3>Новости</h3>

  <news-list-accordion
    [instrumentUid]="uid"
  ></news-list-accordion>
} @else {
  <preloader></preloader>
}
