<div class="account-section">
  <p class="account-label">Портфель</p>
  <select class="account-select" (change)="handleChange($event)">
    @for (account of accounts(); track account.id) {
      <option [value]="account.id" [selected]="account.id === accountId()">{{ account.name }}</option>
    }
  </select>

  @let money = userMoneyRub();

  <p class="account-balance">Баланс: {{ money ? (money | number:'1.2-2') : '-' }} ₽</p>
</div>
