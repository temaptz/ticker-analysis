<div class="graph-container">
  @if (historyPricesResource.isLoading()) {
    <preloader></preloader>
  } @else {
    <div class="chart-wrapper">
      <echarts-graph
        width="100%"
        height="100%"
        [option]="option()"
        (onChartClick)="handleChartClick($event)"
      ></echarts-graph>
    </div>
  }
</div>
